name: Deploy Model Server to Azure

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Image
        id: build_image
        run: |
          IMAGE_URL=ghcr.io/${{ github.repository_owner }}/prenatal-ml
          IMAGE_URL=$(echo $IMAGE_URL | tr '[A-Z]' '[a-z]')
          docker build -t $IMAGE_URL:${{ github.sha }} .
          docker push $IMAGE_URL:${{ github.sha }}
          echo "tag=$IMAGE_URL:${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'prenatalvision-dl-dcacc5a5cddsdff7'
          publish-profile: ${{ secrets.AZURE_DL_PUBLISH_PROFILE }}
          images: ${{ steps.build_image.outputs.tag }}
